services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vela
      POSTGRES_PASSWORD: vela
      POSTGRES_DB: vela
    ports:
      - "5432:5432"
    volumes:
      - vela_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  vela_pgdata:
